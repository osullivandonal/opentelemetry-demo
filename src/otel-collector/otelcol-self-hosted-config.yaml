# OpenTelemetry Collector configuration for self-hosted deployment
# This config forwards telemetry to a local start-local EDOT collector
# instead of exporting directly to Elastic Cloud.
#
# Usage: ./demo.sh docker self-hosted
# Requires: curl -fsSL https://elastic.co/start-local | sh -s -- --edot

exporters:
  debug:
  otlp/startlocal:
    endpoint: ${env:SELF_HOSTED_COLLECTOR_ENDPOINT}
    tls:
      insecure: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: 0.0.0.0:${env:OTEL_COLLECTOR_PORT_HTTP}
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  httpcheck/frontendproxy:
    targets:
      - endpoint: http://frontendproxy:${env:ENVOY_PORT}
  hostmetrics:
    collection_interval: 10s
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.logical.count:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      process:
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true
        metrics:
          process.threads:
            enabled: true
          process.open_file_descriptors:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.disk.operations:
            enabled: true
      network: {}
      processes: {}
      load: {}
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/k3s/containerd/*
            - /var/lib/docker/*
            - /var/lib/kubelet/*
            - /snap/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - fusectl
            - hugetlbfs
            - iso9660
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs
          match_type: strict

processors:
  batch:
  resourcedetection/system:
    detectors: ["system"]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.name:
          enabled: true
        host.id:
          enabled: false
        host.arch:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.cache.l2.size:
          enabled: true
        os.description:
          enabled: true
        os.type:
          enabled: true

service:
  pipelines:
    logs:
      exporters:
        - debug
        - otlp/startlocal
      processors:
        - batch
      receivers:
        - otlp
    metrics/infra/otel:
      exporters:
        - otlp/startlocal
        - debug
      processors:
        - batch
        - resourcedetection/system
      receivers:
        - hostmetrics
    metrics:
      exporters:
        - otlp/startlocal
        - debug
      processors:
        - batch
      receivers:
        - httpcheck/frontendproxy
        - otlp
    traces:
      exporters:
        - otlp/startlocal
        - debug
      processors:
        - batch
      receivers:
        - otlp
